name: Build Android APK

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore stable debug keystore from secret
        if: env.DEBUG_KEYSTORE_BASE64 != ''
        run: echo "$DEBUG_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/debug.keystore.p12

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Print debug signing SHA-1 fingerprint
        run: ./gradlew signingReport | tee signingReport.txt

      - name: Upload signing report artifact
        uses: actions/upload-artifact@v7
        with:
          name: signing-report
          path: signingReport.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk